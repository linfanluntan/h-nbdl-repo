seed: 42
run_avi: true

data:
  data_dir: data/radiomics/
  n_sites: 4
  data_dim: 128  # radiomic feature dimension

avi:
  k_max: 100
  alpha0: 5.0
  encoder_hidden: [256, 128]
  site_embed_dim: 32
  lr: 0.001
  epochs: 300
  batch_size: 128
  temp_init: 1.0
  temp_final: 0.1
  temp_anneal_epochs: 150

downstream:
  outcome_type: binary
  n_representation_features: 30
  n_samples: 2000
  n_tune: 1000
  n_chains: 4
